<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wallz Clone</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
</head>

<body>

<div id="background"></div>

<div id="menuScreen">

    <h1 class="logo">WALLZ</h1>

    <div class="menuCard">

        <button class="menuButton" data-mode="easy">
            Easy AI
        </button>

        <button class="menuButton" data-mode="medium">
            Medium AI
        </button>

        <button class="menuButton" data-mode="hard">
            Hard AI
        </button>

        <button class="menuButton bossButton" data-mode="boss">
            Extra Scary Boss
        </button>

        <button class="menuButton" data-mode="local">
            Local Multiplayer
        </button>

    </div>

</div>

<div id="gameScreen" class="hidden">

    <div id="topBar">

        <div class="playerInfo player1">

            <div class="playerDot cyan"></div>

            <div>
                <div class="playerTitle">
                    Player 1
                </div>

                <div id="p1Walls">
                    Walls: 10
                </div>
            </div>

        </div>

        <div id="turnIndicator">
            Player 1 Turn
        </div>

        <div class="playerInfo player2">

            <div>
                <div class="playerTitle">
                    Player 2
                </div>

                <div id="p2Walls">
                    Walls: 10
                </div>
            </div>

            <div class="playerDot red"></div>

        </div>

    </div>

    <div id="boardContainer">

        <canvas id="board"></canvas>

    </div>

    <div id="bottomBar">

        <button id="resetButton">
            New Game
        </button>

        <button id="menuButton">
            Main Menu
        </button>

    </div>

</div>

<div id="winScreen" class="hidden">

    <div class="winCard">

        <h2 id="winnerText">
            Winner
        </h2>

        <button id="playAgain">
            Play Again
        </button>

        <button id="backToMenu">
            Main Menu
        </button>

    </div>

</div>

<script>

VANTA.NET({

    el: "#background",

    mouseControls: false,
    touchControls: false,
    gyroControls: false,

    minHeight: 200,
    minWidth: 200,

    scale: 1,
    scaleMobile: 1,

    color: 0x18ff82,

    backgroundColor: 0x000000,

    backgroundAlpha: 1,

    points: 20,

    maxDistance: 20,

    spacing: 15,

    showDots: false

});

</script>

<script src="ai.js"></script>
<script src="script.js"></script>

</body>
</html>
